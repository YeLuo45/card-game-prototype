<script>
// ==================== CARD GAME DBG V18 ====================
// 战斗阶段工作流引擎
const CARD_TYPES = { ATTACK: 'attack', SKILL: 'skill', POWER: 'power' };
const INTENTS = { ATTACK: 'attack', DEFEND: 'defend', BUFF: 'buff', MULTI: 'multi' };
const MAX_DECK_SIZE = 30;
const MIN_DECK_SIZE = 10;
const MAX_UPGRADE_LEVEL = 3;
const UPGRADE_GOLD_COST = 15;

// ==================== EVENT BUS ====================
const EventBus = {
  listeners: {},
  
  on(event, callback) {
    if (!this.listeners[event]) this.listeners[event] = [];
    this.listeners[event].push(callback);
    return () => this.off(event, callback);
  },
  
  emit(event, data) {
    if (this.listeners[event]) {
      this.listeners[event].forEach(cb => cb(data));
    }
  },
  
  off(event, callback) {
    if (this.listeners[event]) {
      this.listeners[event] = this.listeners[event].filter(cb => cb !== callback);
    }
  }
};

// ==================== PHASE ENGINE ====================
const PHASES = {
  DRAW: 'draw',
  PLAYER_ACTION: 'playerAction',
  RESOLUTION: 'resolution',
  ENEMY_ACTION: 'enemyAction',
  TURN_END: 'turnEnd'
};

const PHASE_NAMES = {
  [PHASES.DRAW]: '抽牌阶段',
  [PHASES.PLAYER_ACTION]: '行动阶段',
  [PHASES.RESOLUTION]: '结算阶段',
  [PHASES.ENEMY_ACTION]: '敌人行动',
  [PHASES.TURN_END]: '回合结束'
};

class PhaseEngine {
  constructor() {
    this.currentPhase = null;
    this.turn = 0;
    this.isProcessing = false;
  }

  startTurn() {
    this.turn++;
    state.turn = this.turn;
    EventBus.emit('turn:start', { turn: this.turn });
    this.enterPhase(PHASES.DRAW);
  }

  enterPhase(phaseName) {
    const prevPhase = this.currentPhase;
    this.currentPhase = phaseName;
    state.phase = phaseName;
    EventBus.emit('phase:enter', { phase: phaseName, prevPhase, turn: this.turn });
    this.updatePhaseLabel();
    this.tick();
  }

  tick() {
    if (this.isProcessing) return;
    this.isProcessing = true;

    switch (this.currentPhase) {
      case PHASES.DRAW:
        this.executeDrawPhase();
        break;
      case PHASES.PLAYER_ACTION:
        this.executePlayerActionPhase();
        break;
      case PHASES.RESOLUTION:
        this.executeResolutionPhase();
        break;
      case PHASES.ENEMY_ACTION:
        this.executeEnemyActionPhase();
        break;
      case PHASES.TURN_END:
        this.executeTurnEndPhase();
        break;
    }
    
    this.isProcessing = false;
  }

  executeDrawPhase() {
    // Draw 5 cards
    drawCards(5);
    
    // Enter player action phase after a short delay
    setTimeout(() => {
      if (this.currentPhase === PHASES.DRAW) {
        this.enterPhase(PHASES.PLAYER_ACTION);
      }
    }, 300);
  }

  executePlayerActionPhase() {
    document.getElementById('end-turn-btn').disabled = false;
    renderHand();
  }

  executeResolutionPhase() {
    // Resolution phase handles any pending damage calculations
    // For now, just transition to enemy action
    setTimeout(() => {
      this.enterPhase(PHASES.ENEMY_ACTION);
    }, 100);
  }

  executeEnemyActionPhase() {
    const label = document.getElementById('intent-label');
    label.textContent = `${state.enemy.name}行动中...`;
    
    setTimeout(() => {
      executeEnemyIntent();
      EventBus.emit('enemy:action', { enemy: state.enemy });
      
      if (state.player.hp <= 0) {
        endGame(false);
        return;
      }
      
      setTimeout(() => {
        this.enterPhase(PHASES.TURN_END);
      }, 500);
    }, 400);
  }

  executeTurnEndPhase() {
    // Discard hand
    discardHand();
    
    // Check for bone armor ability
    if (state.enemy.ability === 'bone_armor') {
      state.enemy.block += 4;
      showMessage('💀 骷髅激活骨甲，获得4点护盾！', 800);
    }
    
    // Transition to next turn
    setTimeout(() => {
      this.startTurn();
    }, 500);
  }

  endPlayerAction() {
    if (this.currentPhase !== PHASES.PLAYER_ACTION) return;
    if (this.isProcessing) return;
    
    document.getElementById('end-turn-btn').disabled = true;
    this.enterPhase(PHASES.RESOLUTION);
  }

  updatePhaseLabel() {
    const label = document.getElementById('intent-label');
    const phaseName = PHASE_NAMES[this.currentPhase] || this.currentPhase;
    label.textContent = `第${this.turn}回合 - ${phaseName}`;
  }

  canTransitionTo(nextPhase) {
    return true; // Simplified - can add complex logic later
  }
}

const phaseEngine = new PhaseEngine();

// --- 创建卡牌 (支持升级等级) ---
function createCard(name, upgradeLevel = 0) {
  const tmpl = CARD_TEMPLATES[name];
  if (!tmpl) return null;
  const valueMultiplier = [1, 1.3, 1.6, 2.0][upgradeLevel] || 1;
  const value = Math.floor(tmpl.baseValue * valueMultiplier);
  const descIdx = Math.min(upgradeLevel, tmpl.descTemplate.length - 1);
  const description = tmpl.descTemplate[descIdx].replace('{0}', value);
  return {
    name,
    cost: tmpl.baseCost,
    type: tmpl.type,
    value,
    description,
    upgradeLevel
  };
}

function createStarterDeck() {
  const deck = [];
  deck.push(...Array(5).fill(null).map(() => createCard('打击', 0)));
  deck.push(...Array(5).fill(null).map(() => createCard('防御', 0)));
  deck.push(createCard('重击', 0));
  deck.push(createCard('重拳', 0));
  deck.push(createCard('硬撑', 0));
  return deck;
}

// --- 卡牌升级配置 (100%覆盖) ---
function getUpgradeInfo(card) {
  if (card.upgradeLevel >= MAX_UPGRADE_LEVEL) return null;
  const nextLevel = card.upgradeLevel + 1;
  const tmpl = CARD_TEMPLATES[card.name];
  if (!tmpl) return null;
  const valueMultiplier = [1, 1.3, 1.6, 2.0][nextLevel] || 1;
  const nextValue = Math.floor(tmpl.baseValue * valueMultiplier);
  const descIdx = Math.min(nextLevel, tmpl.descTemplate.length - 1);
  const nextDesc = tmpl.descTemplate[descIdx].replace('{0}', nextValue);
  return {
    nextLevel,
    nextValue,
    nextDesc,
    cost: UPGRADE_GOLD_COST * nextLevel
  };
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showMessage(text, duration = 1500) {
  const el = document.getElementById('message');
  el.textContent = text; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function initializeDeck() {
  state.drawPile = shuffle([...state.playerDeck]);
  state.discardPile = []; state.hand = [];
}

function drawCards(n = 5) {
  for (let i = 0; i < n; i++) {
    if (state.drawPile.length === 0) {
      if (state.discardPile.length === 0) break;
      state.drawPile = shuffle([...state.discardPile]);
      state.discardPile = [];
    }
    if (state.drawPile.length > 0) state.hand.push(state.drawPile.pop());
  }
  renderHand(); updateDeckInfo();
}

function discardHand() {
  state.discardPile.push(...state.hand);
  state.hand = []; renderHand(); updateDeckInfo();
}

// --- 敌人AI ---
function rollEnemyIntent() {
  const e = state.enemy;
  const bonus = e.ability === 'fury' ? Math.floor((1 - e.hp / e.maxHp) * 8) : 0;
  const roll = Math.random();
  if (roll < 0.65) {
    state.enemy.intent = INTENTS.ATTACK;
    state.enemy.intentValue = e.atkMin + Math.floor(Math.random() * (e.atkMax - e.atkMin + 1)) + bonus;
  } else if (roll < 0.85) {
    state.enemy.intent = INTENTS.DEFEND;
    state.enemy.intentValue = 5 + Math.floor(Math.random() * 5);
  } else {
    state.enemy.intent = INTENTS.BUFF;
    state.enemy.intentValue = 2 + Math.floor(Math.random() * 3);
  }
  if (e.ability === 'double_strike' && Math.random() < 0.30) {
    state.enemy.intent = INTENTS.MULTI;
    state.enemy.intentValue = Math.floor((e.atkMin + Math.floor(Math.random() * (e.atkMax - e.atkMin + 1)) + bonus) / 2);
  }
}

function executeEnemyIntent() {
  const { intent, intentValue } = state.enemy;
  const e = state.enemy;

  if (intent === INTENTS.ATTACK || intent === INTENTS.MULTI) {
    const hits = intent === INTENTS.MULTI ? 2 : 1;
    for (let h = 0; h < hits; h++) {
      const dmg = Math.max(0, intentValue - state.player.block);
      state.player.hp = Math.max(0, state.player.hp - dmg);
      state.player.block = 0;
      if (h === 0) showMessage(` ${e.name}攻击！造成${intentValue}点伤害（${dmg}穿透护盾）`);
      else showMessage(` ${e.name}连击！再造成${intentValue}点伤害`);
    }
    if (e.ability === 'lifesteal') {
      e.hp = Math.min(e.maxHp, e.hp + Math.floor(intentValue * 0.3));
      showMessage(` ${e.name}吸取了${Math.floor(intentValue * 0.3)}点生命！`);
    }
  } else if (intent === INTENTS.DEFEND) {
    e.block += intentValue;
    showMessage(` ${e.name}防御，获得${intentValue}点护盾！`);
  } else if (intent === INTENTS.BUFF) {
    e.atkMin += intentValue;
    e.atkMax += intentValue;
    showMessage(` ${e.name}变强了！攻击强化+${intentValue}`);
  }
  updateUI();
}

function renderLevelPips() {

function renderHand() {
  const c = document.getElementById('hand-area');
  c.innerHTML = '';
  state.hand.forEach((card, i) => {
    const el = document.createElement('div');
    const canPlay = state.player.energy >= card.cost && phaseEngine.currentPhase === PHASES.PLAYER_ACTION;
    el.className = 'card' + (canPlay ? '' : ' unplayable');
    if (card.upgradeLevel > 0) el.classList.add('lv' + card.upgradeLevel);
    const typeLabel = card.type === 'attack' ? '攻击' : card.type === 'skill' ? '技能' : '能力';
    el.innerHTML = `
      <div class="c-cost">${card.cost}</div>
      ${card.upgradeLevel > 0 ? `<div class="c-upgrade">★${card.upgradeLevel}</div>` : ''}
      <div class="c-name">${card.name}</div>
      <div class="c-type">${typeLabel}</div>
      <div class="c-effect">${card.description}</div>`;
    if (canPlay) el.onclick = () => playCard(i);
    c.appendChild(el);
  });
}

      ${card.upgradeLevel > 0 ? `<div class="dc-upgrade-badge">★${card.upgradeLevel}</div>` : ''}
      <div class="dc-name">${card.name}</div>
      <div class="dc-info">${card.type === 'attack' ? '攻击' : card.type === 'skill' ? '技能' : '能力'} | 费用: ${card.cost}</div>
      <div class="dc-effect">${card.description}</div>
      <button class="remove-btn" onclick="removeCardFromDeck('${card.name}', ${card.upgradeLevel})" ${canRemove ? '' : 'disabled'}>-1</button>
      ${upgradeInfo ? `<button class="upgrade-btn" onclick="upgradeCardInDeck('${card.name}', ${card.upgradeLevel})" ${state.gold >= upgradeInfo.cost ? '' : 'disabled'}>⬆️${upgradeInfo.cost}金</button>` : '<span style="font-size:10px;color:#888;margin-top:6px;">已满级</span>'}
    `;
    container.appendChild(el);
  });

  // Stats
  const total = state.playerDeck.length;
  const attack = state.playerDeck.filter(c => c.type === CARD_TYPES.ATTACK).length;
  const skill = state.playerDeck.filter(c => c.type === CARD_TYPES.SKILL).length;
  const power = state.playerDeck.filter(c => c.type === CARD_TYPES.POWER).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-attack').textContent = attack;
  document.getElementById('stat-skill').textContent = skill;
  document.getElementById('stat-power').textContent = power;
  document.getElementById('stat-gold').textContent = state.gold;
  document.getElementById('modal-deck-count').textContent = `(${total}/${MAX_DECK_SIZE})`;

  // Upgrade shop
  renderUpgradeShop();
}

function renderUpgradeShop() {
  const container = document.getElementById('shop-cards-list');
  container.innerHTML = '';
  const availableCards = [...new Set(state.playerDeck.map(c => c.name))];
  
  availableCards.forEach(cardName => {
    const card = state.playerDeck.find(c => c.name === cardName);
    const upgradeInfo = getUpgradeInfo(card);
    if (!upgradeInfo) return;
    
    const el = document.createElement('div');
    el.className = 'shop-card';
    el.innerHTML = `
      <div class="sc-name">${card.name}</div>
      <div class="sc-cost">⬆️ ${upgradeInfo.cost}💰</div>
      <div class="sc-effect">${card.description}</div>
      <div class="sc-upgrade-info">→ ${upgradeInfo.nextDesc}</div>
    `;
    el.onclick = () => upgradeCardInDeck(cardName, card.upgradeLevel);
    container.appendChild(el);
  });
}

function removeCardFromDeck(cardName, upgradeLevel) {
  if (state.playerDeck.length <= MIN_DECK_SIZE) {
    showMessage(`牌组至少需要${MIN_DECK_SIZE}张卡牌！`);
    return;
  }
  const idx = state.playerDeck.findIndex(c => c.name === cardName && c.upgradeLevel === upgradeLevel);
  if (idx !== -1) {
    state.playerDeck.splice(idx, 1);
    showMessage(`移除了1张 ${cardName}`);
    renderDeckModal();
    updateUI();
  }
}

function upgradeCardInDeck(cardName, currentLevel) {
  const card = state.playerDeck.find(c => c.name === cardName && c.upgradeLevel === currentLevel);
  if (!card) return;
  const upgradeInfo = getUpgradeInfo(card);
  if (!upgradeInfo) {
    showMessage('该卡牌已达最大升级等级！');
    return;
  }
  if (state.gold < upgradeInfo.cost) {
    showMessage(`金币不足！需要${upgradeInfo.cost}金币`);
    return;
  }
  state.gold -= upgradeInfo.cost;
  // 找到第一张该卡牌并升级
  const idx = state.playerDeck.findIndex(c => c.name === cardName && c.upgradeLevel === currentLevel);
  if (idx !== -1) {
    const upgradedCard = createCard(cardName, upgradeInfo.nextLevel);
    state.playerDeck[idx] = upgradedCard;
    showMessage(`⬆️ ${cardName} 升级到 Lv${upgradeInfo.nextLevel}！`);
    renderDeckModal();
    updateUI();
  }
}

// --- 游戏流程 ---
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  state.currentLevel = 0;
  state.player = { hp: 80, maxHp: 80, block: 0, energy: 3, maxEnergy: 3 };
  state.gold = 30;
  state.isNewGame = false;
  if (state.playerDeck.length === 0) {
    state.playerDeck = createStarterDeck();
  }
  _startLevel();
}

function _startLevel() {
  const enemyDef = ENEMIES[state.currentLevel];
  state.enemy = {
    name: enemyDef.name, portrait: enemyDef.portrait,
    hp: enemyDef.hp, maxHp: enemyDef.maxHp,
    atkMin: enemyDef.atkMin, atkMax: enemyDef.atkMax,
    ability: enemyDef.ability, block: 0,
    intent: null, intentValue: 0,
  };
  
  // Reset phase engine
  phaseEngine.turn = 0;
  
  initializeDeck();
  rollEnemyIntent();
  updateUI();
  updateDeckInfo();
  
  // Start first turn
  phaseEngine.startTurn();
}

function playCard(index) {
  if (phaseEngine.currentPhase !== PHASES.PLAYER_ACTION) return;
  const card = state.hand[index];
  if (state.player.energy < card.cost) { showMessage('能量不足！'); return; }
  
  // Before play hook
  EventBus.emit('card:before_play', { card, state });
  
  state.player.energy -= card.cost;
  state.hand.splice(index, 1);
  
  // Execute card effect via CardHooks
  executeCardHook(state, card, 'onPlay');
  
  // After play hook
  EventBus.emit('card:after_play', { card, state });
  
  state.discardPile.push(card);
  
  renderHand(); updateUI(); updateDeckInfo();
  
  // Check for enemy death
  if (state.enemy.hp <= 0) {
    // 过关获得金币奖励
    const goldReward = 10 + state.currentLevel * 5;
    state.gold += goldReward;
    showMessage(`💰 击败敌人！获得${goldReward}金币！`, 2000);
    if (state.currentLevel < ENEMIES.length - 1) {
      setTimeout(() => {
        state.currentLevel++;
        _startLevel();
      }, 1800);
    } else {
      endGame(true);
    }
    return;
  }
  
  // Check for turn end after playing card
  EventBus.emit('card:play', { card, state });
}

function endGame(victory) {
  state.phase = victory ? 'victory' : 'defeat';
  document.getElementById('end-turn-btn').disabled = true;
  document.getElementById('intent-label').textContent = victory ? '🎊 全通关！' : '💀 你死了...';
  showMessage(victory ? '🎉 恭喜！斩杀所有敌人！' : '失败...再试一次', 3000);
  setTimeout(() => {
    document.getElementById('start-screen').style.display = 'flex';
    document.querySelector('.start-screen .btn').textContent = victory ? '再玩一次' : '重新开始';
  }, 2000);
}

// --- Event Bus Setup for Phase Engine ---
EventBus.on('turn:start', ({ turn }) => {
  // Reset player energy and block at start of turn
  state.player.energy = state.player.maxEnergy;
  state.player.block = 0;
  updateUI();
});

EventBus.on('phase:enter', ({ phase }) => {
  if (phase === PHASES.DRAW) {
    updateUI();
  }
});

// Initialize
window.startGame = startGame;
window.openDeckModal = openDeckModal;
window.closeDeckModal = closeDeckModal;
window.removeCardFromDeck = removeCardFromDeck;
window.upgradeCardInDeck = upgradeCardInDeck;
</script>
</body>
