<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DBG卡牌游戏 V4</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    h1 { color: #ffd700; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }

    /* 游戏容器 */
    #game-container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* 状态栏 */
    #status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.4);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 16px;
    }
    #status-bar span { margin: 0 10px; }
    .hp { color: #ff6b6b; }
    .energy { color: #4ecdc4; }
    .shield { color: #a8e6cf; }
    .turn { color: #ffd93d; }

    /* 地图区域 */
    #map-container {
      background: rgba(0,0,0,0.5);
      border-radius: 12px;
      padding: 20px;
      position: relative;
    }
    #map-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #333;
    }
    #map-canvas {
      display: block;
      margin: 0 auto;
      cursor: pointer;
    }

    /* 节点预览 */
    #node-preview {
      display: none;
      background: rgba(0,0,0,0.8);
      border-radius: 10px;
      padding: 15px;
      margin-top: 15px;
      text-align: center;
    }
    #node-preview.show { display: block; }
    #node-preview-title { font-size: 18px; color: #ffd700; margin-bottom: 10px; }
    #node-preview-info { font-size: 14px; color: #ccc; margin-bottom: 10px; }
    #node-preview-btn {
      padding: 10px 30px;
      font-size: 16px;
      background: linear-gradient(145deg, #e74c3c, #c0392b);
      border: none;
      border-radius: 20px;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }
    #node-preview-btn:hover { transform: scale(1.05); }

    /* 敌人区域 */
    #enemy-area {
      background: rgba(80,20,20,0.6);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      border: 2px solid #8b0000;
    }
    #enemy-name { font-size: 22px; font-weight: bold; color: #ff6b6b; margin-bottom: 10px; }
    #enemy-hp-bar {
      width: 100%;
      height: 25px;
      background: #333;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    #enemy-hp-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff4757, #ff6b6b);
      transition: width 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
    }
    #enemy-info {
      display: flex;
      justify-content: center;
      gap: 15px;
      font-size: 14px;
    }
    #enemy-intent {
      background: rgba(255,100,100,0.3);
      padding: 6px 15px;
      border-radius: 20px;
      font-weight: bold;
    }
    #enemy-debuffs {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-top: 8px;
      min-height: 30px;
    }
    .debuff-icon {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: bold;
    }
    .debuff-poison { background: rgba(0,128,0,0.7); }
    .debuff-burn { background: rgba(255,69,0,0.7); }
    .debuff-vulnerable { background: rgba(255,0,0,0.7); }
    .debuff-weak { background: rgba(128,128,128,0.7); }
    .debuff-thorns { background: rgba(139,69,19,0.7); }

    /* 玩家区域 */
    #player-area {
      background: rgba(20,60,80,0.6);
      border-radius: 12px;
      padding: 20px;
      border: 2px solid #2a5298;
    }
    #player-stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    #player-debuffs {
      display: flex;
      gap: 5px;
      margin-top: 8px;
      min-height: 30px;
    }

    /* 手牌 */
    #hand {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      min-height: 160px;
    }
    .card {
      width: 110px;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 12px;
      position: relative;
    }
    .card:hover { transform: translateY(-8px); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
    .card.attack { background: linear-gradient(145deg, #8b0000, #cd5c5c); border: 2px solid #ff6347; }
    .card.skill { background: linear-gradient(145deg, #00008b, #4169e1); border: 2px solid #6495ed; }
    .card.power { background: linear-gradient(145deg, #4b0082, #9370db); border: 2px solid #da70d6; }
    .card.curse { background: linear-gradient(145deg, #2d1b4e, #4a3f6b); border: 2px solid #8b008b; }
    .card.special { background: linear-gradient(145deg, #1b4e2d, #3f6b4a); border: 2px solid #00ff7f; }
    .card.status { background: linear-gradient(145deg, #4e4e4e, #6b6b6b); border: 2px solid #a0a0a0; }
    .card-cost {
      position: absolute;
      top: -8px;
      left: -8px;
      width: 24px;
      height: 24px;
      background: #ffd700;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #000;
      font-size: 14px;
    }
    .card-name { font-weight: bold; font-size: 13px; margin: 5px 0; }
    .card-type { font-size: 10px; opacity: 0.8; }
    .card-effect { font-size: 10px; margin-top: 5px; text-align: center; }
    .card.disabled { opacity: 0.5; cursor: not-allowed; }

    /* 底部控制 */
    #controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.4);
      padding: 12px 20px;
      border-radius: 10px;
    }
    #end-turn {
      padding: 10px 30px;
      font-size: 18px;
      background: linear-gradient(145deg, #2ecc71, #27ae60);
      border: none;
      border-radius: 25px;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s;
    }
    #end-turn:hover { transform: scale(1.05); }
    #end-turn:disabled { background: #555; cursor: not-allowed; }

    /* 战斗日志 */
    #log-panel {
      position: fixed;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 220px;
      max-height: 400px;
      background: rgba(0,0,0,0.8);
      border-radius: 10px;
      padding: 10px;
      overflow-y: auto;
    }
    #log-panel h3 { color: #ffd700; font-size: 14px; margin-bottom: 8px; text-align: center; }
    .log-entry { font-size: 11px; padding: 4px 6px; border-radius: 4px; margin-bottom: 4px; }
    .log-damage { background: rgba(255,0,0,0.2); color: #ff6b6b; }
    .log-heal { background: rgba(0,255,0,0.2); color: #90ee90; }
    .log-block { background: rgba(0,0,255,0.2); color: #87ceeb; }
    .log-debuff { background: rgba(255,165,0,0.2); color: #ffa500; }
    .log-info { background: rgba(128,128,128,0.2); color: #ccc; }

    /* 遮罩层 */
    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #overlay.show { display: flex; }
    #overlay-title { font-size: 28px; color: #ffd700; margin-bottom: 20px; }
    #reward-cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .reward-card {
      width: 130px;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .reward-card:hover { transform: scale(1.1); }
    .reward-card.attack { background: linear-gradient(145deg, #8b0000, #cd5c5c); border: 3px solid #ff6347; }
    .reward-card.skill { background: linear-gradient(145deg, #00008b, #4169e1); border: 3px solid #6495ed; }
    .reward-card.power { background: linear-gradient(145deg, #4b0082, #9370db); border: 3px solid #da70d6; }
    .reward-card.curse { background: linear-gradient(145deg, #2d1b4e, #4a3f6b); border: 3px solid #8b008b; }
    .reward-card.special { background: linear-gradient(145deg, #1b4e2d, #3f6b4a); border: 3px solid #00ff7f; }
    .reward-card.status { background: linear-gradient(145deg, #4e4e4e, #6b6b6b); border: 3px solid #a0a0a0; }

    /* 商店遮罩 */
    #shop-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.9);
      z-index: 100;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    #shop-overlay.show { display: flex; }
    #shop-title { font-size: 28px; color: #ffd700; margin-bottom: 15px; }
    #shop-gold { font-size: 18px; color: #ffd700; margin-bottom: 20px; }
    #shop-cards {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
    }
    .shop-card {
      width: 130px;
      padding: 15px;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s;
      position: relative;
    }
    .shop-card:hover { transform: scale(1.1); }
    .shop-card.attack { background: linear-gradient(145deg, #8b0000, #cd5c5c); border: 3px solid #ff6347; }
    .shop-card.skill { background: linear-gradient(145deg, #00008b, #4169e1); border: 3px solid #6495ed; }
    .shop-card.power { background: linear-gradient(145deg, #4b0082, #9370db); border: 3px solid #da70d6; }
    .shop-card.curse { background: linear-gradient(145deg, #2d1b4e, #4a3f6b); border: 3px solid #8b008b; }
    .shop-card.special { background: linear-gradient(145deg, #1b4e2d, #3f6b4a); border: 3px solid #00ff7f; }
    .shop-card.status { background: linear-gradient(145deg, #4e4e4e, #6b6b6b); border: 3px solid #a0a0a0; }
    .shop-card .card-cost { top: -10px; left: -10px; }
    .shop-card .price-tag {
      position: absolute;
      bottom: -10px;
      right: -10px;
      background: #ffd700;
      color: #000;
      padding: 3px 8px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 12px;
    }
    .shop-card.disabled { opacity: 0.5; cursor: not-allowed; }
    .shop-card.bought { opacity: 0.3; cursor: not-allowed; }
    #shop-leave {
      padding: 10px 30px;
      font-size: 16px;
      background: #555;
      border: none;
      border-radius: 20px;
      color: #fff;
      cursor: pointer;
    }
    #shop-leave:hover { background: #666; }

    /* 开始界面 */
    #start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 40px;
    }
    #start-screen h1 { font-size: 36px; }
    #start-btn {
      padding: 15px 50px;
      font-size: 22px;
      background: linear-gradient(145deg, #e74c3c, #c0392b);
      border: none;
      border-radius: 30px;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s;
    }
    #start-btn:hover { transform: scale(1.1); }

    /* 游戏结束 */
    #game-over-screen, #victory-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 40px;
    }
    #game-over-screen.show, #victory-screen.show { display: flex; }
    #game-over-title { font-size: 36px; color: #ff0000; }
    #victory-title { font-size: 36px; color: #ffd700; }
    .stats-text { font-size: 16px; color: #ccc; }
    .start-btn {
      padding: 15px 40px;
      font-size: 18px;
      background: linear-gradient(145deg, #e74c3c, #c0392b);
      border: none;
      border-radius: 25px;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }
    .start-btn:hover { transform: scale(1.05); }

    @media (max-width: 768px) {
      #log-panel { position: static; width: 100%; margin-top: 10px; transform: none; max-height: 120px; }
      .card { width: 90px; padding: 8px; }
    }
  </style>
</head>
<body>

<div id="start-screen">
  <h1>🃏 DBG卡牌游戏 V4</h1>
  <p>构建你的牌组，击败所有敌人！</p>
  <p>能量: 3/回合 | 攻击 | 防御 | 能力牌</p>
  <p>诅咒牌与特殊牌系统 - 通关3层楼，击败最终Boss！</p>
  <button id="start-btn">开始游戏</button>
</div>

<div id="game-over-screen">
  <h1 id="game-over-title">💀 游戏结束</h1>
  <p class="stats-text" id="game-over-stats"></p>
  <button id="start-btn-retry" class="start-btn">重新开始</button>
</div>

<div id="victory-screen">
  <h1 id="victory-title">🏆 胜利！</h1>
  <p class="stats-text" id="victory-stats"></p>
  <button id="start-btn-next" class="start-btn">再来一局</button>
</div>

<div id="game-container" style="display:none">
  <h1>⚔️ DBG卡牌游戏 V4 - 诅咒与特殊牌系统</h1>

  <!-- 地图界面 -->
  <div id="map-container">
    <div id="map-header">
      <span id="floor-display">🏠 第1层</span>
      <span class="hp">❤️ <span id="map-hp">80</span>/<span id="map-max-hp">80</span></span>
      <span class="energy">💰 <span id="map-gold">0</span></span>
    </div>
    <canvas id="map-canvas" width="800" height="400"></canvas>
    <div id="node-preview">
      <div id="node-preview-title"></div>
      <div id="node-preview-info"></div>
      <button id="node-preview-btn">进入</button>
    </div>
  </div>

  <!-- 战斗界面 -->
  <div id="battle-container" style="display:none">
    <!-- 状态栏 -->
    <div id="status-bar">
      <span class="hp">❤️ 生命: <span id="hp">80</span>/<span id="max-hp">80</span></span>
      <span class="energy">⚡ 能量: <span id="energy">3</span>/3</span>
      <span class="shield">🛡️ 护甲: <span id="shield">0</span></span>
      <span class="turn">🔄 回合: <span id="turn">1</span></span>
    </div>

    <!-- 敌人区域 -->
    <div id="enemy-area">
      <div id="enemy-name">史莱姆</div>
      <div id="enemy-hp-bar"><div id="enemy-hp-fill"></div></div>
      <div id="enemy-info">
        <span id="enemy-hp-text">20/20</span>
        <span id="enemy-armor"></span>
        <span id="enemy-intent">意图: 攻击</span>
      </div>
      <div id="enemy-debuffs"></div>
      <div id="enemy-status"></div>
    </div>

    <!-- 玩家区域 -->
    <div id="player-area">
      <div id="player-stats">
        <span class="hp">❤️ <span id="player-hp">80</span>/<span id="player-max-hp">80</span></span>
        <span class="shield">🛡️ 护甲: <span id="player-shield">0</span></span>
      </div>
      <div id="player-debuffs"></div>
      <div id="hand"></div>
    </div>

    <!-- 控制区 -->
    <div id="controls">
      <span id="deck-info">牌组: <span id="deck-count">13</span> | 弃牌堆: <span id="discard-count">0</span></span>
      <button id="end-turn">结束回合</button>
    </div>
  </div>
</div>

<!-- 战斗日志 -->
<div id="log-panel">
  <h3>📜 战斗日志</h3>
  <div id="log-entries"></div>
</div>

<!-- 奖励选牌遮罩 -->
<div id="overlay">
  <div id="overlay-title">🎉 战斗胜利！选择一张卡牌</div>
  <div id="reward-cards"></div>
</div>

<!-- 商店遮罩 -->
<div id="shop-overlay">
  <div id="shop-title">🛒 商店</div>
  <div id="shop-gold">💰 金币: <span id="shop-current-gold">0</span></div>
  <div id="shop-cards"></div>
  <button id="shop-leave">离开商店</button>
</div>

<script>
// ===== 卡牌数据 =====
const CARDS = {
  strike:  { id: 'strike',  name: '打击',    cost: 1, type: 'attack', effect: { damage: 6 }, description: '造成6点伤害' },
  defend:  { id: 'defend',  name: '防御',    cost: 1, type: 'skill',  effect: { block: 5 }, description: '获得5点护甲' },
  harden:  { id: 'harden',  name: '硬撑',    cost: 1, type: 'skill',  effect: { block: 8, draw: 1 }, description: '获得8点护甲，抽1张牌' },
  consecutiveStrike: { id: 'consecutiveStrike', name: '连续打击', cost: 1, type: 'attack', effect: { damage: 4, hits: 2 }, description: '造成4点伤害2次' },
  painfulStrike:    { id: 'painfulStrike',     name: '痛击',     cost: 2, type: 'attack', effect: { damage: 10, vulnerableChance: 0.4 }, description: '造成10点伤害，40%几率易伤' },
  behead:           { id: 'behead',            name: '斩首',     cost: 3, type: 'attack', effect: { damage: 15, execute: 0.2 }, description: '造成15点伤害，若敌人≤20血则斩杀' },
  ironWall:         { id: 'ironWall',          name: '铁壁',     cost: 1, type: 'skill',  effect: { block: 12 }, description: '获得12点护甲' },
  firstAid:         { id: 'firstAid',          name: '急救',     cost: 2, type: 'skill',  effect: { block: 8, heal: 6 }, description: '获得8点护甲，治疗6点' },
  warCry:           { id: 'warCry',            name: '战吼',     cost: 1, type: 'skill',  effect: { nextAttackMult: 1.5 }, description: '下次攻击伤害+50%' },
  counterStance:    { id: 'counterStance',     name: '反击姿态', cost: 1, type: 'power',  effect: { thorns: 5 }, description: '回合结束时受到攻击时，反伤5点' },
  spikeShell:       { id: 'spikeShell',        name: '尖刺外壳', cost: 2, type: 'power',  effect: { aoeDamage: 3 }, description: '回合结束时对所有敌人造成3点伤害' },
  burningFist:      { id: 'burningFist',       name: '灼热拳头', cost: 2, type: 'power',  effect: { burnChance: 0.25, burnDamage: 2, burnDuration: 2 }, description: '攻击时25%几率灼热2点，持续2回合' },
  vulnerable:       { id: 'vulnerable',        name: '易伤',     cost: 0, type: 'status', effect: { vulnerable: 1 }, description: '受到伤害+50%，持续2回合', duration: 2 },
  weak:             { id: 'weak',              name: '虚弱',     cost: 0, type: 'status', effect: { weak: 1 }, description: '攻击力-50%，持续2回合', duration: 2 },
  // ===== V4 诅咒牌 =====
  painCurse:        { id: 'painCurse',         name: '痛苦诅咒', cost: 0, type: 'curse',  effect: { curseMaxHp: -3 }, description: '诅咒: 最大生命-3' },
  weakCurse:        { id: 'weakCurse',         name: '虚弱诅咒', cost: 0, type: 'curse',  effect: { curseWeak: 2 }, description: '诅咒: 回合开始时攻击力-50%持续2回合' },
  darkCurse:        { id: 'darkCurse',         name: '黑暗诅咒', cost: 0, type: 'curse',  effect: { curseEnergy: -1 }, description: '诅咒: 回合开始时能量-1' },
  deathCurse:       { id: 'deathCurse',         name: '死亡诅咒', cost: 0, type: 'curse',  effect: { curseDamage: 5 }, description: '诅咒: 受到5点伤害' },
  // ===== V4 特殊牌 =====
  demonContract:    { id: 'demonContract',     name: '恶魔契约', cost: 0, type: 'special', effect: { sacrificeHp: 10, gainEnergy: 3 }, description: '牺牲10HP获得3能量' },
  lightningReflex:  { id: 'lightningReflex',   name: '闪电动作', cost: 1, type: 'special', effect: { dodge: 1, draw: 1 }, description: '闪避下次攻击,抽1张' },

// ===== 工具函数 =====
// V4 卡牌类型名称
function getCardTypeName(type) {
  const types = {
    'attack': '攻击',
    'skill': '技能',
    'power': '能力',
    'curse': '诅咒',
    'special': '特殊',
    'status': '状态'
  };
  return types[type] || type;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function weightedRandom(weights) {
  const total = Object.values(weights).reduce((a, b) => a + b, 0);
  let r = Math.random() * total;
  for (const [key, val] of Object.entries(weights)) {
    r -= val;
    if (r <= 0) return key;
  }
  return Object.keys(weights)[0];
}

function addLog(message, type = 'info') {
  gameState.battleLog.unshift({ message, type, turn: gameState.turn });
  if (gameState.battleLog.length > 5) gameState.battleLog.pop();
  renderLog();
}

function getEnemyByType(type, floor = 1) {
  const base = ENEMIES[type];
  if (!base) return null;
  const enemy = JSON.parse(JSON.stringify(base));
  // 根据楼层调整Boss血量
  if (enemy.isBoss) {
    if (floor === 2) enemy.hp = 45;
    if (floor === 3) enemy.hp = 60;
  }
  return enemy;
}

// ===== 地图相关 =====
function isNodeUnlocked(nodeId) {
  return gameState.unlockedNodes.includes(nodeId);
}

function isNodeCompleted(nodeId) {
  return gameState.completedNodes.includes(nodeId);
}

function getNodeById(nodeId) {
  const floor = FLOORS.find(f => f.id === gameState.currentFloor);
  return floor.nodes.find(n => n.id === nodeId);
}

function getFloorNodes() {
  return FLOORS.find(f => f.id === gameState.currentFloor);
}

function unlockNode(nodeId) {
  if (!gameState.unlockedNodes.includes(nodeId)) {
    gameState.unlockedNodes.push(nodeId);
  }
}

function completeNode(nodeId) {
  if (!gameState.completedNodes.includes(nodeId)) {
    gameState.completedNodes.push(nodeId);
  }
  // 解锁相邻节点
  const floor = getFloorNodes();
  floor.edges.forEach(([a, b]) => {
    if (a === nodeId && !gameState.completedNodes.includes(b)) {
      unlockNode(b);
    } else if (b === nodeId && !gameState.completedNodes.includes(a)) {
      unlockNode(a);
    }
  });
}

function initMap() {
  gameState.currentFloor = 1;
  gameState.currentNode = null;
  gameState.unlockedNodes = ['f1r1'];
  gameState.completedNodes = [];
  gameState.inMap = true;
}

function renderMap() {
  const canvas = document.getElementById('map-canvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const floor = getFloorNodes();

  // 绘制连线
  floor.edges.forEach(([a, b]) => {
    const nodeA = getNodeById(a);
    const nodeB = getNodeById(b);
    const completed = gameState.completedNodes.includes(a) && gameState.completedNodes.includes(b);
    
    ctx.beginPath();
    ctx.moveTo(nodeA.x, nodeA.y);
    ctx.lineTo(nodeB.x, nodeB.y);
    ctx.strokeStyle = completed ? '#2ecc71' : '#555';
    ctx.lineWidth = completed ? 3 : 2;
    ctx.setLineDash(completed ? [] : [5, 5]);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // 绘制节点
  floor.nodes.forEach(node => {
    const unlocked = isNodeUnlocked(node.id);
    const completed = isNodeCompleted(node.id);
    const current = gameState.currentNode === node.id;
    const nodeType = NODE_TYPES[node.type];

    ctx.beginPath();
    ctx.arc(node.x, node.y, 35, 0, Math.PI * 2);
    
    if (completed) {
      ctx.fillStyle = '#2ecc71';
    } else if (current) {
      ctx.fillStyle = '#e74c3c';
    } else if (unlocked) {
      ctx.fillStyle = nodeType.color;
    } else {
      ctx.fillStyle = '#333';
    }
    ctx.fill();
    
    // 边框
    ctx.strokeStyle = current ? '#ffd700' : '#fff';
    ctx.lineWidth = current ? 4 : 2;
    ctx.stroke();

    // 图标
    ctx.fillStyle = nodeType.textColor;
    ctx.font = '24px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(nodeType.icon, node.x, node.y - 5);

    // 名称
    ctx.fillStyle = '#fff';
    ctx.font = '12px Arial';
    ctx.fillText(node.name, node.x, node.y + 20);

    // 完成标记
    if (completed) {
      ctx.fillStyle = '#fff';
      ctx.font = '16px Arial';
      ctx.fillText('✓', node.x + 25, node.y - 25);
    }
  });

  // 更新状态显示
  document.getElementById('floor-display').textContent = `🏠 第${gameState.currentFloor}层`;
  document.getElementById('map-hp').textContent = gameState.playerHp;
  document.getElementById('map-max-hp').textContent = gameState.playerMaxHp;
  document.getElementById('map-gold').textContent = gameState.gold;
}

function handleMapClick(e) {
  const canvas = document.getElementById('map-canvas');
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const floor = getFloorNodes();
  
  floor.nodes.forEach(node => {
    const dist = Math.sqrt((x - node.x) ** 2 + (y - node.y) ** 2);
    if (dist < 35 && isNodeUnlocked(node.id)) {
      showNodePreview(node);
    }
  });
}

function showNodePreview(node) {
  gameState.selectedNode = node;
  const preview = document.getElementById('node-preview');
  const title = document.getElementById('node-preview-title');
  const info = document.getElementById('node-preview-info');
  const btn = document.getElementById('node-preview-btn');

  const nodeType = NODE_TYPES[node.type];
  title.textContent = `${nodeType.icon} ${node.name}`;
  
  let infoText = '';
  switch (node.type) {
    case 'combat':
      const enemy1 = getEnemyByType(node.enemy, gameState.currentFloor);
      infoText = `敌人: ${enemy1.name} (${enemy1.hp}血)`;
      break;
    case 'elite':
      const enemy2 = getEnemyByType(node.enemy, gameState.currentFloor);
      infoText = `精英: ${enemy2.name} (${enemy2.hp}血) - 胜利获得金币奖励`;
      break;
    case 'boss':
      const enemy3 = getEnemyByType(node.enemy, gameState.currentFloor);
      infoText = `Boss: ${enemy3.name} (${enemy3.hp}血) - 击败后进入下一层`;
      break;
    case 'rest':
      infoText = `恢复15点生命 (当前: ${gameState.playerHp}/${gameState.playerMaxHp})`;
      break;
    case 'shop':
      infoText = `可购买卡牌 (当前金币: ${gameState.gold})`;
      break;
  }
  info.textContent = infoText;
  preview.classList.add('show');
}

function enterNode() {
  const node = gameState.selectedNode;
  if (!node) return;

  gameState.currentNode = node.id;
  document.getElementById('node-preview').classList.remove('show');

  switch (node.type) {
    case 'combat':
    case 'elite':
    case 'boss':
      startCombat(node);
      break;
    case 'rest':
      handleRest();
      break;
    case 'shop':
      handleShop();
      break;
  }
}

function handleRest() {
  const healAmount = 15;
  const actualHeal = Math.min(healAmount, gameState.playerMaxHp - gameState.playerHp);
  gameState.playerHp += actualHeal;
  addLog(`休息！恢复 ${actualHeal} 点生命`, 'heal');
  completeNode(gameState.currentNode);
  gameState.currentNode = null;
  returnToMap();
}

function handleShop() {
  // 设置商店金币
  gameState.gold = gameState.currentFloor * 10;
  document.getElementById('shop-current-gold').textContent = gameState.gold;
  
  // 生成商店卡牌
  const shopCards = shuffle(NEW_CARDS_POOL).slice(0, 3);
  const container = document.getElementById('shop-cards');
  container.innerHTML = '';

  shopCards.forEach((card, index) => {
    const price = card.type === 'attack' ? 15 + Math.floor(Math.random() * 11) : 20 + Math.floor(Math.random() * 11);
    const div = document.createElement('div');
    div.className = `shop-card ${card.type}`;
    div.dataset.index = index;
    div.dataset.price = price;
    div.innerHTML = `
      <div class="card-cost">${card.cost}</div>
      <div class="card-name">${card.name}</div>
      <div class="card-type">${getCardTypeName(card.type)}</div>
      <div class="card-effect">${card.description}</div>
      <div class="price-tag">💰 ${price}</div>
    `;
    div.onclick = () => buyCard(card, price, div);
    container.appendChild(div);
  });

  document.getElementById('shop-overlay').classList.add('show');
}

function buyCard(card, price, element) {
  if (gameState.gold < price) {
    addLog('金币不足！', 'debuff');
    return;
  }
  if (element.classList.contains('bought')) return;

  gameState.gold -= price;
  gameState.deck.push({ ...card });
  element.classList.add('bought');
  element.style.cursor = 'not-allowed';
  document.getElementById('shop-current-gold').textContent = gameState.gold;
  addLog(`购买卡牌: ${card.name}`, 'info');
}

function leaveShop() {
  document.getElementById('shop-overlay').classList.remove('show');
  completeNode(gameState.currentNode);
  gameState.currentNode = null;
  returnToMap();
}

function returnToMap() {
  gameState.inMap = true;
  document.getElementById('map-container').style.display = 'block';
  document.getElementById('battle-container').style.display = 'none';
  document.getElementById('log-panel').style.display = 'none';
  
  // 检查游戏结束条件
  if (gameState.playerHp <= 0) {
    showGameOver();
    return;
  }
  
  renderMap();
}

// ===== 战斗相关 =====
function startCombat(node) {
  gameState.inMap = false;
  document.getElementById('map-container').style.display = 'none';
  document.getElementById('battle-container').style.display = 'block';
  document.getElementById('log-panel').style.display = 'block';

  // 确定敌人
  let enemyType = node.enemy;
  if (node.type === 'elite') {
    // 精英敌人根据楼层
    const eliteEnemies = { 1: 'skeleton', 2: 'fireElf', 3: 'skeleton' };
    enemyType = eliteEnemies[gameState.currentFloor];
  } else if (node.type === 'boss') {
    enemyType = 'golem';
  } else {
    // 普通战斗敌人
    const combatEnemies = { 1: ['slime', 'goblin'], 2: ['goblin', 'skeleton'], 3: ['skeleton', 'fireElf', 'darkMage'] };
    const pool = combatEnemies[gameState.currentFloor];
    enemyType = pool[Math.floor(Math.random() * pool.length)];
  }

  const enemy = getEnemyByType(enemyType, gameState.currentFloor);
  gameState.enemy = enemy;
  gameState.enemyHp = enemy.hp;
  gameState.enemyMaxHp = enemy.hp;
  gameState.enemyArmor = enemy.armor || 0;
  
  // 重置战斗状态
  gameState.energy = 3;
  gameState.turn = 1;
  gameState.playerShield = 0;
  gameState.playerDebuffs = [];
  gameState.enemyDebuffs = [];
  gameState.thorns = 0;
  gameState.aoeDamage = 0;
  gameState.burnChance = 0;
  gameState.powerCardsPlayedThisCombat = {};
  gameState.battleLog = [];
  gameState.gameOver = false;
  gameState.drawPile = shuffle([...gameState.deck]);
  gameState.discardPile = [];

  addLog(`遭遇 ${enemy.name}！`, 'info');
  rollEnemyIntent();
  renderEnemy();
  renderUI();
  startPlayerTurn();
}

function rollEnemyIntent() {
  const enemy = gameState.enemy;
  const weights = INTENT_WEIGHTS[enemy.id] || INTENT_WEIGHTS.slime;
  const intent = weightedRandom(weights);
  
  let value = 0;
  switch (intent) {
    case 'attack':
      value = enemy.isBoss ? 12 : (enemy.id === 'goblin' ? 4 : 6);
      if (enemy.id === 'fireElf') value = 5;
      if (enemy.id === 'skeleton') value = 8;
      break;
    case 'defend':
      value = enemy.isBoss ? 15 : (enemy.id === 'skeleton' ? 8 : 4);
      break;
    case 'buff':
      value = 0;
      break;
    case 'debuff':
      value = 0;
      break;
    case 'heavy':
      value = 8;
      break;
  }
  
  gameState.enemyIntent = intent;
  gameState.enemyIntentValue = value;
}

function startPlayerTurn() {
  gameState.energy = gameState.maxEnergy;
  gameState.nextAttackMult = 1;
  
  // V4 诅咒效果: 回合开始时处理
  gameState.curses.forEach(curse => {
    if (curse.effect.curseWeak) {
      applyDebuffToPlayer('weak', curse.effect.curseWeak, 2);
    }
    if (curse.effect.curseEnergy) {
      gameState.energy += curse.effect.curseEnergy;
      if (gameState.energy < 0) gameState.energy = 0;
    }
  });
  
  // V4 中毒结算: 每回合受到 poisonStacks * 3 点伤害
  if (gameState.poisonStacks > 0) {
    const poisonDmg = gameState.poisonStacks * 3;
    gameState.playerHp -= poisonDmg;
    addLog(`中毒发作！受到 ${poisonDmg} 点伤害（${gameState.poisonStacks}层）`, 'debuff');
    gameState.poisonStacks = Math.max(0, gameState.poisonStacks - 1);
  }
  
  // V4 流血结算: 回合开始受到 bleedStacks * 2 点伤害
  if (gameState.bleedStacks > 0) {
    const bleedDmg = gameState.bleedStacks * 2;
    gameState.playerHp -= bleedDmg;
    addLog(`流血发作！受到 ${bleedDmg} 点伤害（${gameState.bleedStacks}层）`, 'debuff');
    gameState.bleedStacks = Math.max(0, gameState.bleedStacks - 1);
  }
  
  if (gameState.powerCardsPlayedThisCombat['counterStance']) {
    gameState.thornsActive = true;
  }
  
  drawCards(5);
  renderUI();
  addLog('你的回合开始', 'info');
}

function drawCards(n) {
  for (let i = 0; i < n; i++) {
    if (gameState.drawPile.length === 0) {
      if (gameState.discardPile.length === 0) break;
      gameState.drawPile = shuffle(gameState.discardPile);
      gameState.discardPile = [];
      addLog('重新洗牌', 'info');
    }
    const card = gameState.drawPile.pop();
    if (card) gameState.hand.push(card);
  }
}

// ===== 卡牌效果结算 =====
function playCard(card, index) {
  if (gameState.energy < card.cost) {
    addLog('能量不足！', 'debuff');
    return;
  }
  if (gameState.gameOver) return;

  gameState.energy -= card.cost;
  gameState.hand.splice(index, 1);
  gameState.discardPile.push(card);

  const effect = card.effect;

  if (card.type === 'attack') {
    let damage = effect.damage || 0;
    let hits = effect.hits || 1;
    
    damage = Math.floor(damage * gameState.nextAttackMult);
    // V4 暴击
    damage = Math.floor(damage * gameState.nextCritMult);
    gameState.nextCritMult = 1;
    gameState.nextAttackMult = 1;
    
    const hasWeak = gameState.playerDebuffs.find(d => d.type === 'weak');
    if (hasWeak) {
      damage = Math.floor(damage * 0.5);
      addLog('虚弱状态，伤害-50%', 'debuff');
    }
    
    for (let i = 0; i < hits; i++) {
      dealDamageToEnemy(damage);
    }
    
    // V4 吸血效果
    if (effect.lifesteal && damage > 0) {
      const healAmount = Math.floor(damage * effect.lifesteal);
      const actualHeal = Math.min(healAmount, gameState.playerMaxHp - gameState.playerHp);
      gameState.playerHp += actualHeal;
      if (actualHeal > 0) addLog(`吸血回复 ${actualHeal} 点生命`, 'heal');
    }
    
    if (effect.vulnerableChance && Math.random() < effect.vulnerableChance) {
      applyDebuffToEnemy('vulnerable', 1, 2);
      addLog('敌人陷入易伤！', 'debuff');
    }
    
    if (effect.execute && gameState.enemyHp <= 20) {
      gameState.enemyHp = 0;
      addLog('斩首！敌人被斩杀！', 'damage');
    }
    
    if (gameState.burnChance > 0 && Math.random() < gameState.burnChance) {
      applyDebuffToEnemy('burn', gameState.burnDamage, gameState.burnDuration);
      addLog('敌人被灼热！', 'debuff');
    }
  }

  if (card.type === 'skill') {
    if (effect.block) {
      gameState.playerShield += effect.block;
      addLog(`获得 ${effect.block} 点护甲`, 'block');
    }
    if (effect.heal) {
      const healAmount = Math.min(effect.heal, gameState.playerMaxHp - gameState.playerHp);
      gameState.playerHp += healAmount;
      addLog(`治疗 ${healAmount} 点生命`, 'heal');
    }
    if (effect.draw) {
      drawCards(effect.draw);
      addLog(`抽 ${effect.draw} 张牌`, 'info');
    }
    if (effect.nextAttackMult) {
      gameState.nextAttackMult = effect.nextAttackMult;
      addLog('下次攻击伤害+50%', 'info');
    }
  }

  if (card.type === 'power') {
    gameState.powerCardsPlayedThisCombat[card.id] = true;
    
    if (effect.thorns) {
      gameState.thorns = effect.thorns;
      addLog(`获得 ${effect.thorns} 点荆棘`, 'info');
    }
    if (effect.aoeDamage) {
      gameState.aoeDamage = effect.aoeDamage;
      addLog('获得尖刺外壳', 'info');
    }
    if (effect.burnChance) {
      gameState.burnChance = effect.burnChance;
      gameState.burnDamage = effect.burnDamage;
      gameState.burnDuration = effect.burnDuration;
      addLog('攻击附带灼热', 'info');
    }
  }

  // V4 特殊牌处理
  if (card.type === 'special') {
    if (effect.sacrificeHp && effect.gainEnergy) {
      const sacrifice = effect.sacrificeHp;
      const actualSacrifice = Math.min(sacrifice, gameState.playerHp - 1);
      gameState.playerHp -= actualSacrifice;
      gameState.energy += effect.gainEnergy;
      addLog(`恶魔契约: 牺牲 ${actualSacrifice}HP，获得 ${effect.gainEnergy} 能量`, 'info');
    }
    if (effect.dodge) {
      gameState.dodgeNext = effect.dodge;
      addLog(`获得 ${effect.dodge} 次闪避`, 'info');
    }
    if (effect.nextCrit) {
      gameState.nextCritMult = effect.nextCrit;
      addLog(`下次攻击伤害x${effect.nextCrit}`, 'info');
    }
  }

  // V4 诅咒牌处理
  if (card.type === 'curse') {
    if (effect.curseMaxHp) {
      gameState.playerMaxHp += effect.curseMaxHp;
      if (gameState.playerHp > gameState.playerMaxHp) {
        gameState.playerHp = gameState.playerMaxHp;
      }
      addLog(`${card.name}: 最大生命${effect.curseMaxHp > 0 ? '+' : ''}${effect.curseMaxHp}`, effect.curseMaxHp > 0 ? 'heal' : 'debuff');
    }
    if (effect.curseWeak) {
      applyDebuffToPlayer('weak', effect.curseWeak, 2);
      addLog(`${card.name}: 获得虚弱 ${effect.curseWeak}层`, 'debuff');
    }
    if (effect.curseEnergy) {
      gameState.energy += effect.curseEnergy;
      addLog(`${card.name}: 能量${effect.curseEnergy > 0 ? '+' : ''}${effect.curseEnergy}`, 'info');
    }
    if (effect.curseDamage) {
      dealDamageToPlayer(effect.curseDamage, false);
      addLog(`${card.name}: 受到 ${effect.curseDamage} 点伤害`, 'damage');
    }
    // 诅咒加入玩家诅咒列表
    gameState.curses.push({ ...card });
  }

  // V4 状态牌处理
  if (card.type === 'status') {
    if (effect.vulnerable) {
      applyDebuffToEnemy('vulnerable', 1, effect.vulnerable);
      addLog(`${card.name}: 敌人易伤 ${effect.vulnerable} 回合`, 'debuff');
    }
    if (effect.weak) {
      applyDebuffToEnemy('weak', 1, effect.weak);
      addLog(`${card.name}: 敌人虚弱 ${effect.weak} 回合`, 'debuff');
    }
    if (effect.skipTurn) {
      gameState.skipEnemyNextTurn = true;
      addLog(`${card.name}: 敌人下回合跳过`, 'debuff');
    }
    if (effect.poison) {
      gameState.poisonStacks += effect.poison;
      addLog(`${card.name}: 敌人中毒 ${effect.poison} 层（每回合3点）`, 'debuff');
    }
    if (effect.bleed) {
      gameState.bleedStacks += effect.bleed;
      addLog(`${card.name}: 敌人流血 ${effect.bleed} 层（回合开始2点）`, 'debuff');
    }
  }

  renderUI();
  checkEnemyDeath();
}

function dealDamageToEnemy(damage) {
  let actualDamage = damage;
  
  const hasVulnerable = gameState.enemyDebuffs.find(d => d.type === 'vulnerable');
  if (hasVulnerable) {
    actualDamage = Math.floor(damage * 1.5);
  }
  
  if (gameState.enemyArmor > 0) {
    const blocked = Math.min(gameState.enemyArmor, actualDamage);
    gameState.enemyArmor -= blocked;
    actualDamage -= blocked;
    if (blocked > 0) addLog(`护甲抵消 ${blocked} 点伤害`, 'block');
  }
  
  if (actualDamage > 0) {
    gameState.enemyHp -= actualDamage;
    addLog(`造成 ${actualDamage} 点伤害`, 'damage');
  }
}

function applyDebuffToEnemy(type, stacks, duration) {
  const existing = gameState.enemyDebuffs.find(d => d.type === type);
  const debuffInfo = {
    vulnerable: { name: '易伤', icon: '↓', cssClass: 'debuff-vulnerable' },
    weak:       { name: '虚弱', icon: '↓', cssClass: 'debuff-weak' },
    poison:     { name: '中毒', icon: '☠', cssClass: 'debuff-poison' },
    burn:       { name: '灼热', icon: '🔥', cssClass: 'debuff-burn' },
  };
  
  if (existing) {
    if (['poison', 'burn'].includes(type)) {
      existing.stacks += stacks;
    }
    existing.duration = duration;
  } else {
    const info = debuffInfo[type] || { name: type, icon: '❓', cssClass: '' };
    gameState.enemyDebuffs.push({ type, stacks: stacks || 1, duration, ...info });
  }
}

function applyDebuffToPlayer(type, stacks, duration) {
  const existing = gameState.playerDebuffs.find(d => d.type === type);
  const debuffInfo = {
    vulnerable: { name: '易伤', icon: '↓', cssClass: 'debuff-vulnerable' },
    weak:       { name: '虚弱', icon: '↓', cssClass: 'debuff-weak' },
    poison:     { name: '中毒', icon: '☠', cssClass: 'debuff-poison' },
    burn:       { name: '灼热', icon: '🔥', cssClass: 'debuff-burn' },
  };
  
  if (existing) {
    if (['poison', 'burn'].includes(type)) {
      existing.stacks += stacks;
    }
    existing.duration = duration;
  } else {
    const info = debuffInfo[type] || { name: type, icon: '❓', cssClass: '' };
    gameState.playerDebuffs.push({ type, stacks: stacks || 1, duration, ...info });
  }
}

// ===== 结束回合 =====
function endTurn() {
  if (gameState.gameOver) return;
  
  if (gameState.thorns > 0 && gameState.thornsActive) {
    addLog(`荆棘反弹 ${gameState.thorns} 点伤害`, 'damage');
  }
  
  if (gameState.aoeDamage > 0) {
    dealDamageToEnemy(gameState.aoeDamage);
    addLog(`尖刺外壳造成 ${gameState.aoeDamage} 点伤害`, 'damage');
  }
  
  processDebuffs('player');
  
  gameState.discardPile.push(...gameState.hand);
  gameState.hand = [];
  
  executeEnemyIntent();
  processDebuffs('enemy');
  
  if (checkEnemyDeath()) return;
  if (checkPlayerDeath()) return;
  
  gameState.turn++;
  gameState.thornsActive = false;
  gameState.enemyArmor = gameState.enemy.armor || 0;
  
  startPlayerTurn();
}

function processDebuffs(target) {
  const debuffs = target === 'player' ? gameState.playerDebuffs : gameState.enemyDebuffs;
  const toRemove = [];
  
  debuffs.forEach(debuff => {
    if (debuff.type === 'poison' || debuff.type === 'burn') {
      const damage = debuff.stacks * (debuff.type === 'burn' ? 2 : 3);
      if (target === 'player') {
        dealDamageToPlayer(damage, false);
        addLog(`中毒造成 ${damage} 点伤害`, 'damage');
      } else {
        dealDamageToEnemy(damage);
        addLog(`${debuff.name}造成 ${damage} 点伤害`, 'damage');
      }
    }
    debuff.duration--;
    if (debuff.duration <= 0) {
      toRemove.push(debuff.type);
    }
  });
  
  toRemove.forEach(type => {
    const idx = debuffs.findIndex(d => d.type === type);
    if (idx >= 0) debuffs.splice(idx, 1);
    addLog(`${type} 效果结束`, 'info');
  });
}

function executeEnemyIntent() {
  // V4 中毒/流血结算: 敌人回合开始时受到毒伤
  if (gameState.poisonStacks > 0) {
    const poisonDmg = gameState.poisonStacks * 3;
    gameState.enemyHp -= poisonDmg;
    addLog(`敌人中毒发作！受到 ${poisonDmg} 点伤害（${gameState.poisonStacks}层）`, 'debuff');
    gameState.poisonStacks = Math.max(0, gameState.poisonStacks - 1);
    if (gameState.enemyHp <= 0) {
      addLog('敌人被毒死！', 'info');
      checkEnemyDeath();
      return;
    }
  }
  
  if (gameState.bleedStacks > 0) {
    const bleedDmg = gameState.bleedStacks * 2;
    gameState.enemyHp -= bleedDmg;
    addLog(`敌人流血发作！受到 ${bleedDmg} 点伤害（${gameState.bleedStacks}层）`, 'debuff');
    gameState.bleedStacks = Math.max(0, gameState.bleedStacks - 1);
    if (gameState.enemyHp <= 0) {
      addLog('敌人流血过多而死！', 'info');
      checkEnemyDeath();
      return;
    }
  }
  
  // V4 混乱状态: 敌人跳过回合
  if (gameState.skipEnemyNextTurn) {
    gameState.skipEnemyNextTurn = false;
    addLog('敌人被混乱，跳过本回合', 'debuff');
    renderEnemy();
    return;
  }
  
  const intent = gameState.enemyIntent;
  const value = gameState.enemyIntentValue;
  const enemy = gameState.enemy;
  
  let intentText = '';
  
  switch (intent) {
    case 'attack':
      intentText = `攻击 ${value}`;
      dealDamageToPlayer(value, true);
      break;
    case 'defend':
      intentText = `防御 +${value}`;
      gameState.enemyArmor += value;
      addLog(`敌人获得 ${value} 护甲`, 'block');
      break;
    case 'buff':
      intentText = '强化';
      if (enemy.id === 'fireElf' || Math.random() < 0.3) {
        const debuffType = Math.random() < 0.5 ? 'weak' : 'vulnerable';
        applyDebuffToPlayer(debuffType, 1, 2);
        addLog(`敌人对你施加了${debuffType === 'weak' ? '虚弱' : '易伤'}！`, 'debuff');
      }
      break;
    case 'debuff':
      intentText = 'Debuff';
      applyDebuffToPlayer('burn', 2, 2);
      addLog('火焰精灵灼热你！', 'debuff');
      break;
    case 'curse':
      intentText = '诅咒';
      const curseCard = CURSE_CARDS_POOL[Math.floor(Math.random() * CURSE_CARDS_POOL.length)];
      gameState.curses.push({ ...curseCard });
      addLog(`黑暗法师施加了${curseCard.name}！`, 'debuff');
      break;
    case 'heavy':
      intentText = `重压 ${value}`;
      dealDamageToPlayer(value, true);
      addLog('巨石像发动重压攻击！', 'damage');
      break;
  }
  
  if (enemy.isBoss && gameState.turn % 3 === 0) {
    gameState.enemyArmor += 8;
    addLog('巨石像获得 8 护甲', 'block');
  }
  
  addLog(`敌人意图: ${intentText}`, 'info');
  renderEnemy();
}

function dealDamageToPlayer(damage, isEnemyAttack = true) {
  // V4 闪避判定
  if (isEnemyAttack && gameState.dodgeNext > 0) {
    gameState.dodgeNext--;
    addLog('闪避成功！', 'info');
    return;
  }
  
  const hasWeak = gameState.playerDebuffs.find(d => d.type === 'weak');
  if (hasWeak && isEnemyAttack) {
    damage = Math.floor(damage * 0.5);
    addLog('虚弱状态，敌人伤害-50%', 'debuff');
  }
  
  const hasVulnerable = gameState.playerDebuffs.find(d => d.type === 'vulnerable');
  if (hasVulnerable) {
    damage = Math.floor(damage * 1.5);
    addLog('易伤状态，受到伤害+50%', 'debuff');
  }
  
  if (gameState.playerShield > 0) {
    const blocked = Math.min(gameState.playerShield, damage);
    gameState.playerShield -= blocked;
    damage -= blocked;
    if (blocked > 0) addLog(`护甲抵消 ${blocked} 点伤害`, 'block');
  }
  
  if (gameState.thorns > 0 && isEnemyAttack) {
    const thornsDamage = gameState.thorns;
    dealDamageToEnemy(thornsDamage);
    addLog(`荆棘反弹 ${thornsDamage} 点伤害`, 'damage');
  }
  
  if (damage > 0) {
    gameState.playerHp -= damage;
    addLog(`受到 ${damage} 点伤害`, 'damage');
  }
}

function checkEnemyDeath() {
  if (gameState.enemyHp <= 0) {
    gameState.enemyHp = 0;
    renderEnemy();
    
    const node = getNodeById(gameState.currentNode);
    const isElite = node && node.type === 'elite';
    const isBoss = node && node.type === 'boss';
    
    if (isBoss) {
      addLog('🏆 击败Boss！', 'info');
      completeNode(gameState.currentNode);
      gameState.totalBattlesWon++;
      
      // 检查是否通关
      if (gameState.currentFloor >= 3) {
        // 胜利！
        setTimeout(() => showVictory(), 500);
        return true;
      } else {
        // 进入下一层：先递增楼层号，再初始化解锁
        gameState.currentFloor++;
        // 重置新楼层的战斗状态
        gameState.energy = 3;
        gameState.playerShield = 0;
        gameState.hand = [];
        gameState.drawPile = [];
        gameState.discardPile = [];
        gameState.curses = [];
        gameState.poisonStacks = 0;
        gameState.bleedStacks = 0;
        gameState.enemyHp = 0;
        gameState.enemyArmor = 0;
        gameState.enemyIntent = null;
        gameState.enemyIntentValue = 0;
        gameState.currentNode = null;
        // 初始化新楼层解锁节点：从当前楼层继承已完成节点，起点节点自动解锁
        const nextFloor = FLOORS.find(f => f.id === gameState.currentFloor);
        gameState.unlockedNodes = [];
        if (nextFloor) {
          nextFloor.nodes.forEach(node => {
            // 起点节点：无入边（不在任何边的第二个位置）
            const hasIncoming = nextFloor.edges.some(([a, b]) => b === node.id);
            if (!hasIncoming) {
              unlockNode(node.id);
            }
          });
        }
        setTimeout(() => {
          addLog(`进入第 ${gameState.currentFloor} 层！`, 'info');
          returnToMap();
        }, 500);
        return true;
      }
    }
    
    // 战斗胜利
    addLog(`${gameState.enemy.name} 被击败！`, 'info');
    completeNode(gameState.currentNode);
    gameState.totalBattlesWon++;
    
    // 精英战斗奖励金币
    if (isElite) {
      const goldReward = gameState.currentFloor * 10;
      gameState.gold += goldReward;
      gameState.totalGoldEarned += goldReward;
      addLog(`获得 ${goldReward} 金币奖励！`, 'info');
    }
    
    setTimeout(() => {
      showRewardSelection();
    }, 500);
    return true;
  }
  return false;
}

function checkPlayerDeath() {
  if (gameState.playerHp <= 0) {
    gameState.playerHp = 0;
    renderUI();
    addLog('你被击败了...', 'info');
    setTimeout(() => showGameOver(), 500);
    gameState.gameOver = true;
    return true;
  }
  return false;
}

function showRewardSelection() {
  const rewards = shuffle(NEW_CARDS_POOL).slice(0, 3);
  const container = document.getElementById('reward-cards');
  container.innerHTML = '';
  
  rewards.forEach(card => {
    const div = document.createElement('div');
    div.className = `reward-card ${card.type}`;
    div.innerHTML = `
      <div class="card-cost">${card.cost}</div>
      <div class="card-name">${card.name}</div>
      <div class="card-type">${getCardTypeName(card.type)}</div>
      <div class="card-effect">${card.description}</div>
    `;
    div.onclick = () => selectReward(card);
    container.appendChild(div);
  });
  
  document.getElementById('overlay').classList.add('show');
}

function selectReward(card) {
  gameState.deck.push({ ...card });
  document.getElementById('overlay').classList.remove('show');
  addLog(`获得新卡: ${card.name}`, 'info');
  
  returnToMap();
}

function showGameOver() {
  document.getElementById('game-container').style.display = 'none';
  document.getElementById('log-panel').style.display = 'none';
  document.getElementById('game-over-screen').classList.add('show');
  document.getElementById('game-over-stats').textContent = 
    `通关楼层: ${gameState.currentFloor} | 战斗胜利: ${gameState.totalBattlesWon} | 获得金币: ${gameState.totalGoldEarned}`;
}

function showVictory() {
  document.getElementById('game-container').style.display = 'none';
  document.getElementById('log-panel').style.display = 'none';
  document.getElementById('victory-screen').classList.add('show');
  document.getElementById('victory-stats').textContent = 
    `总战斗胜利: ${gameState.totalBattlesWon} | 总获得金币: ${gameState.totalGoldEarned}`;
}

// ===== UI 渲染 =====
function renderUI() {
  document.getElementById('hp').textContent = gameState.playerHp;
  document.getElementById('max-hp').textContent = gameState.playerMaxHp;
  document.getElementById('player-hp').textContent = gameState.playerHp;
  document.getElementById('player-max-hp').textContent = gameState.playerMaxHp;
  document.getElementById('energy').textContent = gameState.energy;
  document.getElementById('shield').textContent = gameState.playerShield;
  document.getElementById('player-shield').textContent = gameState.playerShield;
  document.getElementById('turn').textContent = gameState.turn;
  document.getElementById('deck-count').textContent = gameState.deck.length;
  document.getElementById('discard-count').textContent = gameState.discardPile.length;
  
  renderHand();
  renderPlayerDebuffs();
}

function renderHand() {
  const container = document.getElementById('hand');
  container.innerHTML = '';
  
  gameState.hand.forEach((card, index) => {
    const div = document.createElement('div');
    div.className = `card ${card.type}`;
    if (gameState.energy < card.cost) div.classList.add('disabled');
    
    div.innerHTML = `
      <div class="card-cost">${card.cost}</div>
      <div class="card-name">${card.name}</div>
      <div class="card-type">${getCardTypeName(card.type)}</div>
      <div class="card-effect">${card.description}</div>
    `;
    
    if (gameState.energy >= card.cost && !gameState.gameOver) {
      div.onclick = () => playCard(card, index);
    }
    
    container.appendChild(div);
  });
}

function renderEnemy() {
  const enemy = gameState.enemy;
  if (!enemy) return;
  
  document.getElementById('enemy-name').textContent = enemy.name;
  document.getElementById('enemy-hp-text').textContent = `${Math.max(0, gameState.enemyHp)}/${gameState.enemyMaxHp}`;
  
  const hpPercent = Math.max(0, gameState.enemyHp) / gameState.enemyMaxHp * 100;
  document.getElementById('enemy-hp-fill').style.width = `${hpPercent}%`;
  document.getElementById('enemy-hp-fill').textContent = `${Math.max(0, gameState.enemyHp)}/${gameState.enemyMaxHp}`;
  
  document.getElementById('enemy-armor').textContent = gameState.enemyArmor > 0 ? `🛡️ ${gameState.enemyArmor}` : '';
  
  const intentLabels = {
    attack: `⚔️ 攻击 ${gameState.enemyIntentValue}`,
    defend: `🛡️ 防御 +${gameState.enemyIntentValue}`,
    buff: '⬆️ 强化',
    debuff: '⬇️ Debuff',
    heavy: `💥 重压 ${gameState.enemyIntentValue}`,
  };
  document.getElementById('enemy-intent').textContent = `意图: ${intentLabels[gameState.enemyIntent] || gameState.enemyIntent}`;
  
  const debuffContainer = document.getElementById('enemy-debuffs');
  debuffContainer.innerHTML = '';
  gameState.enemyDebuffs.forEach(debuff => {
    const span = document.createElement('span');
    span.className = `debuff-icon ${debuff.cssClass}`;
    span.textContent = `${debuff.icon}${debuff.duration}`;
    span.title = `${debuff.name}: ${debuff.stacks}层，持续${debuff.duration}回合`;
    debuffContainer.appendChild(span);
  });
  
  // V4 中毒/流血层数显示
  let extraStatus = '';
  if (gameState.poisonStacks > 0) {
    extraStatus += ` <span style="color:#27ae60">☠️中毒×${gameState.poisonStacks}</span>`;
  }
  if (gameState.bleedStacks > 0) {
    extraStatus += ` <span style="color:#c0392b">🩸流血×${gameState.bleedStacks}</span>`;
  }
  if (extraStatus) {
    const statusEl = document.getElementById('enemy-status');
    if (statusEl) {
      statusEl.innerHTML = extraStatus;
    }
  }
}

function renderPlayerDebuffs() {
  const container = document.getElementById('player-debuffs');
  container.innerHTML = '';
  
  gameState.playerDebuffs.forEach(debuff => {
    const span = document.createElement('span');
    span.className = `debuff-icon ${debuff.cssClass}`;
    span.textContent = `${debuff.icon}${debuff.duration}`;
    span.title = `${debuff.name}: ${debuff.stacks}层，持续${debuff.duration}回合`;
    container.appendChild(span);
  });
}

function renderLog() {
  const container = document.getElementById('log-entries');
  container.innerHTML = '';
  gameState.battleLog.forEach(entry => {
    const div = document.createElement('div');
    div.className = `log-entry log-${entry.type}`;
    div.textContent = `[T${entry.turn}] ${entry.message}`;
    container.appendChild(div);
  });
}

// ===== 初始化游戏 =====
function initGame() {
  // 初始牌组
  const startingDeck = [
    CARDS.strike, CARDS.strike, CARDS.strike, CARDS.strike,
    CARDS.defend, CARDS.defend, CARDS.defend, CARDS.defend,
    CARDS.harden, CARDS.harden,
    CARDS.consecutiveStrike, CARDS.consecutiveStrike,
    CARDS.painfulStrike,
  ];
  
  gameState = {
    playerHp: 80,
    playerMaxHp: 80,
    playerShield: 0,
    gold: 0,
    deck: startingDeck.map(c => ({ ...c })),
    hand: [],
    drawPile: [],
    discardPile: [],
    energy: 3,
    maxEnergy: 3,
    turn: 1,
    enemy: null,
    enemyHp: 0,
    enemyMaxHp: 0,
    enemyArmor: 0,
    enemyIntent: null,
    enemyIntentValue: 0,
    playerDebuffs: [],
    enemyDebuffs: [],
    thorns: 0,
    aoeDamage: 0,
    burnChance: 0,
    burnDamage: 0,
    burnDuration: 0,
    nextAttackMult: 1,
    thornsActive: false,
    gameOver: false,
    battleLog: [],
    powerCardsPlayedThisCombat: {},
    // V4 诅咒与特殊状态
    curses: [],
    dodgeNext: 0,
    nextCritMult: 1,
    skipEnemyNextTurn: false,
    poisonStacks: 0,
    bleedStacks: 0,
    currentFloor: 1,
    currentNode: null,
    unlockedNodes: [],
    completedNodes: [],
    inMap: true,
    selectedNode: null,
    totalBattlesWon: 0,
    totalGoldEarned: 0,
  };

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-over-screen').classList.remove('show');
  document.getElementById('victory-screen').classList.remove('show');
  document.getElementById('game-container').style.display = 'block';
  document.getElementById('map-container').style.display = 'block';
  document.getElementById('battle-container').style.display = 'none';
  document.getElementById('log-panel').style.display = 'none';
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('shop-overlay').classList.remove('show');
  document.getElementById('node-preview').classList.remove('show');

  initMap();
  renderMap();
}

// ===== 事件绑定 =====
document.getElementById('start-btn').onclick = initGame;
document.getElementById('start-btn-retry').onclick = initGame;
document.getElementById('start-btn-next').onclick = initGame;
document.getElementById('end-turn').onclick = endTurn;
document.getElementById('map-canvas').onclick = handleMapClick;
document.getElementById('node-preview-btn').onclick = enterNode;
document.getElementById('shop-leave').onclick = leaveShop;
</script>
